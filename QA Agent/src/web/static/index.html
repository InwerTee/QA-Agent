<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gro QA Agent</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #f9fafb;
        --text: #1f2933;
        --muted: #667085;
        --border: #d9dee7;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --success: #047857;
        --danger: #b42318;
        --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .title-block {
        min-width: 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .version-badge {
        flex: 0 0 auto;
        min-height: 28px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 10px;
        background: var(--surface);
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.4;
        white-space: nowrap;
      }

      .tool {
        display: grid;
        gap: 20px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      form {
        display: grid;
        gap: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #344054;
        font-size: 14px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
      }

      input[type="text"] {
        padding: 0 12px;
      }

      input[type="file"] {
        padding: 9px 10px;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button,
      .download-link {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        font-weight: 650;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: white;
      }

      button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button.secondary,
      .download-link {
        border-color: var(--border);
        background: var(--surface);
        color: var(--text);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        background: var(--surface-2);
        color: var(--muted);
        line-height: 1.45;
      }

      .status[data-tone="success"] {
        border-color: rgba(4, 120, 87, 0.35);
        color: var(--success);
        background: #f0fdf4;
      }

      .status[data-tone="error"] {
        border-color: rgba(180, 35, 24, 0.35);
        color: var(--danger);
        background: #fff5f5;
      }

      .progress {
        display: none;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        background: var(--surface-2);
      }

      .progress.visible {
        display: grid;
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
      }

      .progress-count,
      .progress-current {
        color: var(--muted);
        font-size: 12px;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #e5e7eb;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 180ms ease;
      }

      .progress-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .progress-chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        color: var(--muted);
        background: var(--surface);
        font-size: 12px;
      }

      .results {
        display: none;
        gap: 14px;
        border-top: 1px solid var(--border);
        padding-top: 20px;
      }

      .results.visible {
        display: grid;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 8px;
      }

      .failure-analysis {
        display: none;
        gap: 8px;
      }

      .failure-analysis.visible {
        display: grid;
      }

      .failure-title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .failure-title strong {
        font-size: 14px;
      }

      .failure-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .failure-list {
        display: grid;
        gap: 8px;
      }

      .failure-row {
        display: grid;
        grid-template-columns: minmax(140px, 180px) 64px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        background: var(--surface-2);
      }

      .failure-row strong,
      .failure-row span,
      .failure-row p {
        min-width: 0;
      }

      .failure-count {
        color: var(--text);
        font-weight: 700;
      }

      .failure-action {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .metric {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        background: var(--surface-2);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 2px;
        font-size: 18px;
      }

      .paths {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 920px);
          padding: 24px 0;
        }

        .grid,
        .summary,
        .failure-row {
          grid-template-columns: 1fr;
        }

        header {
          display: grid;
        }

        .version-badge {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="title-block">
          <h1>Gro QA Agent</h1>
          <p>Local runner for Paragon PRD and test case packages.</p>
        </div>
        <div id="version-badge" class="version-badge" title="Version of the currently running local server">
          Agent version: loading
        </div>
      </header>

      <section class="tool" aria-label="QA Agent local runner">
        <form id="run-form">
          <div class="grid">
            <label>
              Run label
              <input
                id="run-label"
                name="run-label"
                type="text"
                placeholder="Optional, e.g. Test"
                autocomplete="off"
              />
              <span class="hint">Optional name for this local run</span>
            </label>

            <label>
              PRD
              <input id="prd" name="prd" type="file" accept="application/pdf,.pdf" required />
              <span class="hint">PDF only</span>
            </label>
          </div>

          <label>
            Paragon test cases
            <input
              id="test-cases"
              name="test-cases"
              type="file"
              accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,.xlsx"
              required
            />
            <span class="hint">Excel .xlsx only</span>
          </label>

          <div class="actions">
            <button id="run-button" class="primary" type="submit">Run QA Agent</button>
            <button id="reset-button" class="secondary" type="reset">Reset</button>
          </div>
        </form>

        <div id="status" class="status" role="status">Ready.</div>

        <section id="progress" class="progress" aria-label="Run progress">
          <div class="progress-head">
            <strong id="progress-title">Preparing</strong>
            <span id="progress-count" class="progress-count"></span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div id="progress-current" class="progress-current"></div>
          <div id="progress-summary" class="progress-summary"></div>
        </section>

        <section id="results" class="results" aria-label="Run results">
          <div class="summary" id="summary"></div>
          <div id="failure-analysis" class="failure-analysis"></div>
          <div class="actions">
            <a id="filled-excel" class="download-link" href="#">Download filled Excel</a>
            <a id="report-md" class="download-link" href="#">Download report</a>
            <button id="open-folder" class="secondary" type="button">Open result folder</button>
          </div>
          <div class="paths" id="paths"></div>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("run-form");
      const runButton = document.getElementById("run-button");
      const statusBox = document.getElementById("status");
      const progress = document.getElementById("progress");
      const progressTitle = document.getElementById("progress-title");
      const progressCount = document.getElementById("progress-count");
      const progressFill = document.getElementById("progress-fill");
      const progressCurrent = document.getElementById("progress-current");
      const progressSummary = document.getElementById("progress-summary");
      const results = document.getElementById("results");
      const summary = document.getElementById("summary");
      const failureAnalysis = document.getElementById("failure-analysis");
      const paths = document.getElementById("paths");
      const versionBadge = document.getElementById("version-badge");
      const filledExcelLink = document.getElementById("filled-excel");
      const reportLink = document.getElementById("report-md");
      const openFolderButton = document.getElementById("open-folder");

      const localServerUrl = "http://127.0.0.1:4173";
      const fileModeMessage = `This page must be opened from the local QA Agent server. Run npm run qa:web, then open ${localServerUrl}.`;
      let currentOpenFolderAction = null;
      let activeJobId = null;

      if (window.location.protocol === "file:") {
        runButton.disabled = true;
        versionBadge.textContent = "Agent version: file mode";
        setStatus(fileModeMessage, "error");
      } else {
        loadServerVersion();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearResult();

        if (window.location.protocol === "file:") {
          setStatus(fileModeMessage, "error");
          return;
        }

        const runLabel = document.getElementById("run-label").value.trim();
        const prd = document.getElementById("prd").files[0];
        const testCases = document.getElementById("test-cases").files[0];

        if (!prd || !prd.name.toLowerCase().endsWith(".pdf")) {
          setStatus("Choose a PRD PDF file.", "error");
          return;
        }

        if (!testCases || !testCases.name.toLowerCase().endsWith(".xlsx")) {
          setStatus("Choose a Paragon test case .xlsx file.", "error");
          return;
        }

        runButton.disabled = true;
        setStatus("Uploading files and starting the local runner.");

        try {
          const payload = {
            runLabel,
            prd: await readFilePayload(prd),
            testCases: await readFilePayload(testCases)
          };
          const response = await fetch("/api/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const body = await response.json();

          if (!response.ok) {
            throw new Error(body.error || "QA Agent run failed.");
          }

          if (body.status === "running") {
            renderJobStatus(body);
            const completedJob = await pollJob(body.jobId);
            if (!completedJob) return;
            renderResult(completedJob.result);
            setStatus(`Done. Run ${completedJob.result.runId} completed.`, "success");
          } else if (body.status === "done" && body.result) {
            renderResult(body.result);
            setStatus(`Done. Run ${body.result.runId} completed.`, "success");
          } else {
            renderResult(body);
            setStatus(`Done. Run ${body.runId} completed.`, "success");
          }
        } catch (error) {
          setStatus(formatRunError(error), "error");
        } finally {
          runButton.disabled = false;
        }
      });

      form.addEventListener("reset", () => {
        activeJobId = null;
        clearResult();
        setStatus("Ready.");
      });

      openFolderButton.addEventListener("click", async () => {
        if (!currentOpenFolderAction) return;
        await fetch(currentOpenFolderAction, { method: "POST" });
      });

      async function readFilePayload(file) {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
        return {
          name: file.name,
          contentType: file.type,
          dataBase64: String(dataUrl).split(",")[1] || ""
        };
      }

      async function pollJob(jobId) {
        activeJobId = jobId;

        while (activeJobId === jobId) {
          await sleep(1500);
          const response = await fetch(`/api/run-status/${encodeURIComponent(jobId)}`);
          const body = await response.json();

          if (!response.ok) {
            throw new Error(body.error || "Could not read run status.");
          }

          renderJobStatus(body);

          if (body.status === "done") {
            activeJobId = null;
            if (!body.result) {
              throw new Error("Run completed but no result payload was returned.");
            }
            return body;
          }

          if (body.status === "error") {
            activeJobId = null;
            throw new Error(body.error || body.message || "QA Agent run failed.");
          }
        }

        return null;
      }

      function renderJobStatus(job) {
        const packageProgress = job.progress || {};
        const run = packageProgress.run || {};
        const total = Number(run.total || 0);
        const completed = Number(run.completed || 0);
        const phase = packageProgress.phase || job.status || "running";
        const percent = total > 0 ? Math.min(100, Math.round((completed / total) * 100)) : 8;
        const currentCase = run.currentCase;
        const completedCase = run.completedCase;

        progressTitle.textContent = phaseLabel(phase);
        progressCount.textContent = total > 0 ? `${completed}/${total}` : "";
        progressFill.style.width = `${percent}%`;
        progressCurrent.textContent = currentCase
          ? `Running ${currentCase.index}/${total}: ${currentCase.stable_id} - ${currentCase.title}`
          : completedCase
            ? `Completed ${completedCase.stable_id}: ${completedCase.status}`
            : job.message || "Running.";
        progressSummary.innerHTML = renderProgressSummary(run.summary);
        progress.classList.add("visible");
        setStatus(job.message || packageProgress.message || "Running.");
      }

      function renderProgressSummary(runSummary) {
        if (!runSummary) return "";
        const order = ["PASS", "PRODUCT_BUG", "SETUP_BLOCKED", "AGENT_BLOCKED", "SCRIPT_BLOCKED", "ENV_BLOCKED", "MANUAL_REVIEW"];
        return order
          .map((key) => `<span class="progress-chip">${key}: ${Number(runSummary[key] || 0)}</span>`)
          .join("");
      }

      function renderResult(result) {
        const order = ["PASS", "PRODUCT_BUG", "SETUP_BLOCKED", "AGENT_BLOCKED", "SCRIPT_BLOCKED", "ENV_BLOCKED", "MANUAL_REVIEW"];
        summary.innerHTML = order
          .map((key) => {
            const value = result.summary[key] || 0;
            return `<div class="metric"><span>${key}</span><strong>${value}</strong></div>`;
          })
          .join("");
        renderFailureAnalysis(result.failureAnalysis);

        filledExcelLink.href = result.downloads.filledExcel;
        reportLink.href = result.downloads.reportMarkdown;
        currentOpenFolderAction = result.actions.openResultFolder;

        paths.innerHTML = [
          `Inferred release: ${escapeHtml(result.release)}`,
          `Agent version: ${escapeHtml(result.agentVersion || "unknown")}`,
          `Execution readiness: ${escapeHtml(formatExecutionReadiness(result.executionReadiness))}`,
          `Filled Excel: ${escapeHtml(result.files.filledWorkbook)}`,
          `Report: ${escapeHtml(result.files.reportMarkdown)}`,
          `Result folder: ${escapeHtml(result.files.resultFolder)}`,
          `Processed cases: ${escapeHtml(result.selectedCases.join(", "))}`
        ]
          .map((line) => `<div>${line}</div>`)
          .join("");
        results.classList.add("visible");
      }

      function formatExecutionReadiness(readiness) {
        if (!readiness) return "not available";
        return `${Number(readiness.ready || 0)} ready / ${Number(readiness.blocked || 0)} blocked / ${Number(readiness.manual_review || 0)} review`;
      }

      function renderFailureAnalysis(analysis) {
        if (!analysis || !Array.isArray(analysis.clusters) || analysis.clusters.length === 0) {
          failureAnalysis.classList.remove("visible");
          failureAnalysis.innerHTML = "";
          return;
        }

        const rows = analysis.clusters.slice(0, 5).map((cluster) => {
          return `
            <div class="failure-row">
              <strong>${escapeHtml(cluster.label)}</strong>
              <span class="failure-count">${Number(cluster.count || 0)}</span>
              <p class="failure-action">${escapeHtml(cluster.recommended_next_action || "")}</p>
            </div>
          `;
        });

        failureAnalysis.innerHTML = `
          <div class="failure-title">
            <strong>Failure intelligence</strong>
            <span>${Number(analysis.attention_case_count || 0)} cases need attention</span>
          </div>
          <div class="failure-list">${rows.join("")}</div>
        `;
        failureAnalysis.classList.add("visible");
      }

      function clearResult() {
        progress.classList.remove("visible");
        progressTitle.textContent = "Preparing";
        progressCount.textContent = "";
        progressFill.style.width = "0%";
        progressCurrent.textContent = "";
        progressSummary.innerHTML = "";
        results.classList.remove("visible");
        summary.innerHTML = "";
        failureAnalysis.classList.remove("visible");
        failureAnalysis.innerHTML = "";
        paths.innerHTML = "";
        filledExcelLink.removeAttribute("href");
        reportLink.removeAttribute("href");
        currentOpenFolderAction = null;
      }

      function setStatus(message, tone = "") {
        statusBox.textContent = message;
        if (tone) {
          statusBox.dataset.tone = tone;
        } else {
          delete statusBox.dataset.tone;
        }
      }

      function formatRunError(error) {
        const message = error instanceof Error ? error.message : String(error);
        if (message === "Failed to fetch" || message.includes("NetworkError")) {
          return `Could not reach the local QA Agent server. Keep npm run qa:web running, then open ${localServerUrl}.`;
        }
        return message;
      }

      async function loadServerVersion() {
        try {
          const response = await fetch("/api/version");
          const body = await response.json();
          if (!response.ok) {
            throw new Error(body.error || "Could not read QA Agent version.");
          }
          versionBadge.textContent = `Agent ${body.agentVersion || body.version || "unknown"}`;
        } catch {
          versionBadge.textContent = "Agent version: unknown";
        }
      }

      function phaseLabel(phase) {
        const labels = {
          preparing: "Preparing input",
          triaging: "Reading cases",
          running: "Running cases",
          exporting: "Exporting result",
          completed: "Completed",
          done: "Completed",
          error: "Failed"
        };
        return labels[phase] || "Running";
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }
    </script>
  </body>
</html>
